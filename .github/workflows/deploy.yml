name: Build and deploy Node.js app to Azure Web App

on:
  push:
    branches:
      - main  # <-- CAMBIA ESTO por 'master' si tu rama principal se llama master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # Versión estable de Node

    - name: Install dependencies
      run: npm install

    # Si tu mockapi necesita compilarse (ej. si usa Vite/Vue), descomenta la línea de abajo borrando el '#'
    - name: Build app
      run: npm run build

    - name: 'Deploy to Azure Web App'
      uses: azure/webapps-deploy@v3
      with:
        app-name: 'cortisense-mockapi'
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: .
